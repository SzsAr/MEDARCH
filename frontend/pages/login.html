<!doctype html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>MEDARCH | Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="../css/styles.css" rel="stylesheet">
</head>
<body>
	<main class="medarch-shell d-flex align-items-center justify-content-center px-3 py-5">
		<section class="medarch-login-panel medarch-card medarch-fade-in overflow-hidden">
			<div class="medarch-hero p-4 p-md-5">
				<div class="d-flex align-items-center gap-3 mb-3">
					<div class="medarch-mark">M</div>
					<div>
						<div class="small text-uppercase opacity-75">Sistema documental clínico</div>
						<h1 class="h3 mb-0">MEDARCH</h1>
					</div>
				</div>
				<p class="mb-0 opacity-75">Accede al panel para revisar usuarios y validar el consumo de la API.</p>
			</div>

			<div class="p-4 p-md-5">
				<div id="loginMessage" class="medarch-form-feedback"></div>
				<form id="loginForm" class="mt-2" novalidate>
					<div class="mb-3">
						<label class="form-label medarch-form-label" for="loginUsuario">Usuario</label>
						<input id="loginUsuario" name="usuario" type="text" class="form-control medarch-input" placeholder="Ingresa tu usuario" autocomplete="username" required>
					</div>
					<div class="mb-4">
						<label class="form-label medarch-form-label" for="loginPassword">Contraseña</label>
						<input id="loginPassword" name="password" type="password" class="form-control medarch-input" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
					</div>
					<button id="loginSubmit" type="submit" class="btn medarch-btn medarch-btn-primary w-100">
						Iniciar sesión
					</button>
				</form>
				<p class="medarch-help mt-3 mb-0 text-center">La sesión se guarda en el navegador para facilitar las pruebas.</p>
			</div>
		</section>
	</main>

	<script type="module" src="../js/auth.js"></script>
</body>
</html>
